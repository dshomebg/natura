# NATURA — nginx reverse proxy vhost.
# Place at /etc/nginx/sites-available/natura.conf and symlink into
# sites-enabled, then: nginx -t && systemctl reload nginx
# Run certbot afterwards to obtain SSL and auto-add the 443 server block:
#   certbot --nginx -d natura.example.com -d www.natura.example.com

server {
    listen 80;
    listen [::]:80;
    server_name natura.example.com www.natura.example.com;

    # Allow media uploads from the Payload admin.
    client_max_body_size 25m;

    # Long-cache immutable Next build assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
