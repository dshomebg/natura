# Production stack for NATURA: app (Next.js + Payload) + PostgreSQL.
#
# The app image is built LOCALLY and shipped to the server as a tar
# (see deploy-prod.ps1) — the server never builds. Postgres is pulled on the
# server. Compose auto-reads the server's `.env` for the ${...} values.
#
# The app binds to 127.0.0.1:3100 only — the host nginx reverse-proxies the
# public domain (deploy/nginx/natura.conf). Postgres is internal to the compose
# network (db:5432), so it does NOT clash with the dshome-postgres on 5432.

name: natura-prod

services:
  db:
    image: postgres:17-alpine
    container_name: natura-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - natura-prod-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: natura-prod-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://www.natura-bg.com}
    container_name: natura-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@natura-bg.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-NATURA}
    volumes:
      - natura-prod-media:/app/media
    ports:
      # Exposed only to localhost; nginx on the host proxies to it.
      - "127.0.0.1:3100:3000"

volumes:
  natura-prod-db:
    name: natura-prod-db
  natura-prod-media:
    name: natura-prod-media
